services:
  db:
    image: mysql:8.4.10
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - url-tribunal-nw

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    image: url-tribunal-api
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src/python/url_tribunal:/app/url_tribunal
    depends_on:
      db:
        condition: service_healthy
    networks:
      - url-tribunal-nw

volumes:
  db_data:

networks:
  url-tribunal-nw:
    driver: bridge